<div class="relative inline-block overflow-visible">
  <!-- Trigger -->
  <div 
    (click)="toggleDropdown()"
    class="relative cursor-pointer hover:scale-110 active:scale-95 transition-all p-2 z-[70]"
  >
    <span class="text-2xl">🔔</span>
    <span *ngIf="notifications.length > 0" 
          class="absolute top-1 right-1 w-5 h-5 bg-blue-600 text-white text-[10px] font-black rounded-full border-2 border-white flex items-center justify-center animate-bounce shadow-lg">
      {{notifications.length}}
    </span>
  </div>

  <ng-container *ngIf="isOpen">
    <!-- Overlay para cerrar -->
    <div class="fixed inset-0 z-[80] bg-transparent" (click)="isOpen = false"></div>
    
    <!-- Dropdown: Ajustado para ser responsivo dentro del área con sidebar -->
    <!-- 
      - fixed: En móvil es mejor fijarlo para controlar su posición respecto al viewport.
      - md:absolute: En pantallas más grandes vuelve a su comportamiento original.
      - right-4: Margen de seguridad a la derecha.
      - w-[calc(100vw-300px)]: Calculamos el ancho restando la sidebar y un margen.
    -->
    <div class="fixed md:absolute right-4 md:right-0 mt-4 w-[calc(100vw-280px)] sm:w-80 md:w-96 bg-white rounded-[1.5rem] md:rounded-[2.5rem] shadow-[0_25px_60px_rgba(0,0,0,0.15)] border border-slate-100 z-[100] overflow-hidden animate-in fade-in zoom-in-95 duration-300 origin-top-right text-left">
      
      <!-- Header -->
      <div class="p-6 md:p-8 border-b border-slate-50 bg-white flex justify-between items-center">
        <h3 class="font-black text-slate-900 text-[9px] md:text-[11px] uppercase tracking-[0.15em] md:tracking-[0.25em] italic">Buzón de Avisos</h3>
        <span class="bg-blue-50 text-blue-600 px-2 md:px-3 py-1 rounded-full text-[8px] md:text-[9px] font-black uppercase">
          {{notifications.length}} <span class="hidden xs:inline">Pendientes</span>
        </span>
      </div>

      <!-- Content -->
      <div class="max-h-[350px] md:max-h-[420px] overflow-y-auto custom-scrollbar bg-white">
        <ng-container *ngIf="notifications.length > 0; else noNotifs">
          
          <div *ngFor="let notif of notifications" class="p-4 md:p-6 border-b border-slate-50 hover:bg-slate-50/50 transition-all group relative">
            <div class="flex gap-3 md:gap-5">
              
              <!-- Icono: Reducido en móvil -->
              <div [ngClass]="{
                'bg-rose-100 text-rose-600': notif.type === 'RIESGO',
                'bg-amber-100 text-amber-600': notif.type === 'EXAMEN',
                'bg-blue-100 text-blue-600': notif.type === 'TAREA',
                'bg-emerald-100 text-emerald-600': notif.type === 'FELICITACION'
              }" class="w-10 h-10 md:w-12 md:h-12 rounded-xl md:rounded-2xl flex items-center justify-center text-lg md:text-xl shrink-0 shadow-sm transition-transform group-hover:scale-110">
                <span *ngIf="notif.type === 'RIESGO'">⚠️</span>
                <span *ngIf="notif.type === 'EXAMEN'">📝</span>
                <span *ngIf="notif.type === 'TAREA'">📂</span>
                <span *ngIf="notif.type === 'FELICITACION'">✨</span>
                <span *ngIf="!['RIESGO','EXAMEN','TAREA','FELICITACION'].includes(notif.type)">📢</span>
              </div>

              <div class="flex-1 min-w-0">
                <div class="flex justify-between items-start mb-1">
                  <span class="text-[8px] md:text-[9px] font-black text-slate-400 uppercase tracking-widest">
                    {{notif.type || 'AVISO'}}
                  </span>
                  <span class="text-[8px] font-bold text-slate-300">AHORA</span>
                </div>
                
                <p class="text-[10px] md:text-xs font-bold text-slate-700 leading-relaxed mb-3 md:mb-4 break-words">
                  {{notif.content || notif.message}}
                </p>
                
                <button 
                  (click)="confirmarLectura(notif.id)"
                  class="flex items-center gap-2 text-[8px] md:text-[9px] font-black text-blue-600 uppercase tracking-widest hover:text-emerald-500 transition-all"
                >
                  Confirmar <span class="hidden sm:inline">Recepción</span> <span class="text-xs">✓</span>
                </button>
              </div>
            </div>
          </div>

        </ng-container>

        <ng-template #noNotifs>
          <div class="p-10 md:p-16 text-center">
            <div class="w-16 h-16 md:w-20 md:h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 md:mb-6">
              <span class="text-3xl md:text-4xl opacity-40">✨</span>
            </div>
            <p class="text-[9px] md:text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] italic">Todo al día</p>
          </div>
        </ng-template>
      </div>
      
      <!-- Footer -->
      <div class="p-4 md:p-6 bg-slate-50/50 border-t border-slate-100 text-center">
        <button class="text-[8px] md:text-[9px] font-black text-slate-400 uppercase tracking-[0.2em] md:tracking-[0.3em] hover:text-blue-600 transition-all">
          Ver Historial <span class="hidden xs:inline">Completo</span>
        </button>
      </div>
    </div>
  </ng-container>
</div>
