<button 
  (click)="toggleMenu()" 
  class="fixed top-4 left-4 z-[50] p-3 bg-[#0F172A] text-white rounded-xl md:hidden shadow-lg border border-slate-700">
  {{ isMenuOpen ? '✕' : '☰' }}
</button>

<div 
  *ngIf="isMenuOpen" 
  (click)="toggleMenu()" 
  class="fixed inset-0 bg-black/50 z-40 md:hidden backdrop-blur-sm animate-in fade-in duration-300">
</div>

<div 
  [class.translate-x-0]="isMenuOpen"
  class="w-64 bg-[#0F172A] h-screen flex flex-col fixed left-0 top-0 z-45 shadow-2xl text-slate-300 transition-transform duration-300 ease-in-out -translate-x-full md:translate-x-0">
  <div class="p-8 flex items-center gap-3">
    <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg">E</div>
    <div>
      <h1 class="font-bold text-white text-lg leading-none tracking-tight">EduBridge</h1>
      <span [class]="userRole === 'docente' ? 'bg-blue-500/10 text-blue-400' : 'bg-emerald-500/10 text-emerald-400'"
            class="text-[9px] font-black uppercase tracking-[0.15em] px-2 py-0.5 rounded-md mt-1 inline-block">
        Portal {{userRole}}
      </span>
    </div>
  </div>

  <nav class="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
    <div *ngFor="let item of filteredMenu"
         (click)="changePage(item.id); isMenuOpen = false"
         [class.bg-blue-600]="currentPage === item.id"
         [class.text-white]="currentPage === item.id"
         class="flex items-center gap-3 p-3.5 rounded-2xl cursor-pointer transition-all duration-300 group hover:bg-slate-800/50 hover:text-white">
      <span class="text-lg transition-transform duration-300 group-hover:scale-110">{{item.icon}}</span>
      <span class="font-semibold text-sm tracking-tight">{{item.name}}</span>
    </div>
  </nav>

  <div class="p-6 bg-slate-900/40 border-t border-slate-800/50 space-y-5">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 bg-gradient-to-tr from-indigo-500 via-purple-500 to-pink-500 rounded-2xl flex items-center justify-center text-white text-xs font-black border border-white/10 shadow-lg shrink-0">
        {{getInitials(userName)}}
      </div>
      <div class="overflow-hidden text-left">
        <p class="text-xs font-bold text-white truncate leading-none mb-1">{{userName || 'Cargando...'}}</p>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest italic opacity-70">{{userRole}}</p>
      </div>
    </div>
    <button (click)="logout()" class="w-full flex items-center justify-center gap-2 py-3 rounded-2xl bg-slate-800/50 hover:bg-rose-500/10 hover:text-rose-500 transition-all text-[10px] font-black uppercase tracking-[0.2em] border border-slate-700/50 group">
      <span>Logout</span><span>🚪</span>
    </button>
  </div>
</div>
